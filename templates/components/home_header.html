{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark home-header">
  <div class="container-fluid">
    <a class="navbar-brand brand-lockup" href="{% url 'home' %}">
      <img class="brand-logo" src="{% static 'images/logo.svg' %}" alt="CPZ logo">
      <span class="brand-copy">
        <span class="brand-copy__title">CPZ</span>
        <span class="brand-copy__subtitle">Community posts zone</span>
      </span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarScroll">
      <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll header-scroll-area">
        {% if request.user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'home' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'posts:add_post' %}">Add Post</a>
        </li>
        <li class="nav-item">
          <a class="nav-link "  href="#" >Top Post</a>
        </li>
        {% endif %}

        
      </ul>
      <form class="d-flex search-form" role="search" action="{% url 'home' %}" method="get">
        <input class="form-control search-input me-2" type="search" name="q" value="{{ search_query|default:'' }}" placeholder="Search posts" aria-label="Search posts"/>
        {% if selected_category %}
          <input type="hidden" name="category" value="{{ selected_category }}">
        {% endif %}
        <button class="btn btn-outline-success search-btn" type="submit">Search</button>
      </form>
      <div class="d-flex ms-4 gap-2 auth-actions">
        {% if request.user.is_authenticated %}
         <a class="profile-pill" href="{% url 'author:profile' %}"><i class="fa-solid fa-circle-user"></i> {{request.user.username}}</a>
        {% else %}
         <a class="btn btn-outline-light nav-cta nav-cta--ghost" href="{% url 'author:login' %}">Login</a>
          <a class="btn btn-outline-success nav-cta nav-cta--solid" href="{% url 'author:register' %}">Sign Up</a>
        {% endif %}
         
      </div>
       
    </div>
  </div>
</nav>
